name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          pip install fastapi uvicorn opentelemetry-instrumentation-fastapi

      - name: Build Executable
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "Kora_AI" --icon "NONE" --collect-all chromadb --exclude-module PyQt5 main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kora-AI-Windows
          path: dist/Kora_AI.exe

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: "This is an automated build of the latest Kora source code. Build time: ${{ github.event.head_commit.timestamp }}"
          draft: false
          prerelease: true
          files: dist/Kora_AI.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
